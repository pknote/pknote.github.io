<!DOCTYPE html>
<html lang="zh">
<head>
  <base target="_blank">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>胖氪导航 - 管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/navi.css" rel="stylesheet">
  <style>
    body{padding:20px;background:#f5f5f5;}
    .panel{border-radius:8px;margin-bottom:20px;}
    .nav-tabs{margin-bottom:15px;}
    .link-item{padding:10px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;}
    .link-item:hover{background:#f9f9f9;}
    .link-name{flex:0 0 120px;font-weight:bold;}
    .link-url{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#666;}
    .link-desc{flex:0 0 200px;color:#999;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .link-actions{flex:0 0 100px;text-align:right;}
    .json-output{background:#1a1a2e;color:#23d186;font-family:Consolas,Monaco,monospace;font-size:13px;padding:15px;border-radius:8px;max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-all;}
    .copy-success{background:#23d186!important;}
  </style>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h2><span class="c2">≡</span> 胖氪导航管理后台</h2>
        <p class="text-muted">生成 HTML 代码，粘贴到 index.html 对应位置</p>
      </div>
    </div>

    <!-- 分类切换 -->
    <ul class="nav nav-tabs" id="category-tabs">
      <li class="active"><a href="#" data-category="朋友圈">朋友圈</a></li>
      <li><a href="#" data-category="优质博客">优质博客</a></li>
    </ul>
    <div class="form-inline" style="margin-bottom:15px;">
      <div class="form-group">
        <input type="text" class="form-control" id="new-category" placeholder="新分类名称">
      </div>
      <button class="btn btn-success" id="btn-add-cat">添加分类</button>
    </div>

    <!-- 添加链接 -->
    <div class="panel panel-default">
      <div class="panel-heading">添加链接</div>
      <div class="panel-body">
        <form class="form-inline" id="add-form">
          <div class="form-group">
            <input type="text" class="form-control" id="input-name" placeholder="名称" required>
          </div>
          <div class="form-group">
            <input type="url" class="form-control" id="input-url" placeholder="链接" required>
          </div>
          <div class="form-group">
            <input type="text" class="form-control" id="input-desc" placeholder="描述">
          </div>
          <div class="form-group">
            <select class="form-control" id="input-border">
              <option value="b1">红色边框</option>
              <option value="b6">黄色边框</option>
            </select>
          </div>
          <button type="submit" class="btn btn-success">添加</button>
        </form>
      </div>
    </div>

    <!-- 链接列表 -->
    <div class="panel panel-default">
      <div class="panel-heading" id="list-heading">链接列表</div>
      <div class="panel-body" id="link-list"></div>
    </div>

    <!-- 输出 -->
    <div class="panel panel-default">
      <div class="panel-heading">
        HTML 代码
        <button class="btn btn-xs btn-primary pull-right" id="btn-copy">复制</button>
      </div>
      <div class="panel-body">
        <div class="json-output" id="html-output"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script>
  $(function() {
    var STORAGE_KEY = 'pknav_admin_data';
    var currentCat = '朋友圈';
    var data = {};

    // 加载
    function loadData() {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          data = JSON.parse(saved);
        } catch(e) {
          data = {};
        }
      }
      renderTabs();
      renderList();
      updateHtml();
    }

    // 保存
    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // 渲染 tabs
    function renderTabs() {
      var $tabs = $('#category-tabs');
      $tabs.empty();
      for (var cat in data) {
        var active = (cat === currentCat) ? 'active' : '';
        $tabs.append('<li class="' + active + '"><a href="#" data-category="' + cat + '">' + cat + '</a></li>');
      }
      if (Object.keys(data).length === 0) {
        currentCat = '朋友圈';
        data['朋友圈'] = [];
        renderTabs();
      }
    }

    // 渲染列表
    function renderList() {
      var $list = $('#link-list');
      var items = data[currentCat] || [];
      $('#list-heading').text(currentCat + ' - ' + items.length + ' 条');

      if (!items.length) {
        $list.html('<p class="text-muted">暂无链接，点上方表单添加</p>');
        return;
      }

      var html = '';
      items.forEach(function(item, i) {
        html += '<div class="link-item">';
        html += '<span class="link-name">' + item.name + '</span>';
        html += '<span class="link-url" title="' + item.url + '">' + item.url + '</span>';
        if (item.desc) html += '<span class="link-desc">' + item.desc + '</span>';
        html += '<span class="link-actions">';
        html += '<button class="btn btn-xs btn-danger del-btn" data-i="' + i + '">删除</button>';
        html += '</span></div>';
      });
      $list.html(html);
    }

    // 更新 HTML 输出
    function updateHtml() {
      var items = data[currentCat] || [];
      if (!items.length) {
        $('#html-output').text('<!-- ' + currentCat + ' -->\n<!-- 暂无内容 -->');
        return;
      }
      var html = '  <!-- ' + currentCat + ' -->\n';
      html += '  <div class="container">\n';
      html += '    <div class="ckcard">\n';
      html += '      <div class="row">\n';
      html += '        <div class="cardhd c1">≡ ' + currentCat + ' ≡</div>\n';
      items.forEach(function(item) {
        var border = item.border || 'b1';
        var desc = item.desc || '';
        html += '        <div class="col-xs-6 col-sm-3 col-md-2"><a href="' + item.url + '"><div class="card-title ' + border + '"><div class="tit">' + item.name + '</div><p>' + desc + '</p></div></a></div>\n';
      });
      html += '      </div>\n';
      html += '    </div>\n';
      html += '  </div>\n';
      $('#html-output').text(html);
    }

    // 切换分类
    $('#category-tabs').on('click', 'a', function(e) {
      e.preventDefault();
      currentCat = $(this).data('category');
      $('#category-tabs li').removeClass('active');
      $(this).parent().addClass('active');
      renderList();
      updateHtml();
      return false;
    });

    // 添加分类
    $('#btn-add-cat').click(function() {
      var name = $('#new-category').val().trim();
      if (!name) return;
      if (data[name]) {
        alert('分类已存在');
        return;
      }
      data[name] = [];
      currentCat = name;
      saveData();
      renderTabs();
      renderList();
      updateHtml();
      $('#new-category').val('');
    });

    // 添加链接
    $('#add-form').submit(function(e) {
      e.preventDefault();
      var name = $('#input-name').val().trim();
      var url = $('#input-url').val().trim();
      var desc = $('#input-desc').val().trim();
      var border = $('#input-border').val();
      if (!name || !url) return;

      data[currentCat].push({ name: name, url: url, desc: desc, border: border });
      saveData();
      renderList();
      updateHtml();
      $('#input-name').val('');
      $('#input-url').val('');
      $('#input-desc').val('');
    });

    // 删除
    $('#link-list').on('click', '.del-btn', function() {
      var i = $(this).data('i');
      data[currentCat].splice(i, 1);
      saveData();
      renderList();
      updateHtml();
    });

    // 复制
    $('#btn-copy').click(function() {
      navigator.clipboard.writeText($('#html-output').text()).then(function() {
        $('#btn-copy').text('已复制!').addClass('copy-success');
        setTimeout(function() {
          $('#btn-copy').text('复制').removeClass('copy-success');
        }, 2000);
      });
    });

    // 初始化
    loadData();
  });
  </script>
</body>
</html>
